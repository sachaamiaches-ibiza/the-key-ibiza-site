name: Pre-render Pages for SEO

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerender:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: the-key-ibiza-frontend/package-lock.json

      - name: Install dependencies
        working-directory: the-key-ibiza-frontend
        run: npm ci

      - name: Install Chromium
        run: npx puppeteer browsers install chrome

      - name: Build and pre-render
        working-directory: the-key-ibiza-frontend
        run: |
          node scripts/generate-sitemap.mjs
          npm run build
          node scripts/prerender.mjs
          rm -rf prerendered/*
          cp -r dist/* prerendered/

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update pre-rendered pages [skip ci]"
          file_pattern: "the-key-ibiza-frontend/prerendered/*"
