name: The Key Ibiza - Full Monitor

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Run all checks
        id: checks
        run: |
          FAILURES=""

          echo "## 🔍 The Key Ibiza Monitor" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 1. UPTIME
          echo "### 1. Uptime" >> $GITHUB_STEP_SUMMARY
          for url in "https://thekey-ibiza.com|Home" "https://thekey-ibiza.com/villas|Villas" "https://thekey-ibiza.com/services|Services" "https://thekey-ibiza.com/about|About" "https://thekey-ibiza.com/blog|Blog" "https://thekey-ibiza.com/boats|Boats" "https://thekey-ibiza.com/yachts|Yachts" "https://elegantcollection.store|WhiteLabel"; do
            URL=$(echo $url | cut -d'|' -f1)
            NAME=$(echo $url | cut -d'|' -f2)
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null)
            if [ "$CODE" = "200" ]; then
              echo "- ✅ $NAME" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **$NAME FAILED ($CODE)**" >> $GITHUB_STEP_SUMMARY
              FAILURES="${FAILURES}${NAME} no responde (HTTP ${CODE})\n"
            fi
          done

          # 2. BACKEND API
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 2. Backend API" >> $GITHUB_STEP_SUMMARY

          STATUS=$(curl -s --max-time 10 "https://the-key-ibiza-backend.vercel.app/" 2>/dev/null)
          if echo "$STATUS" | grep -q '"ok"'; then
            echo "- ✅ Backend status OK" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Backend DOWN**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}Backend API no responde\n"
          fi

          VILLAS=$(curl -s --max-time 15 "https://the-key-ibiza-backend.vercel.app/villas" 2>/dev/null | head -c 50)
          if echo "$VILLAS" | grep -q '"id"'; then
            echo "- ✅ Villas API" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Villas API broken**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}API de villas no devuelve datos\n"
          fi

          BLOG=$(curl -s --max-time 10 "https://the-key-ibiza-backend.vercel.app/blog" 2>/dev/null | head -c 50)
          if echo "$BLOG" | grep -q '"id"'; then
            echo "- ✅ Blog API" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Blog API broken**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}API del blog no devuelve datos\n"
          fi

          AVAIL=$(curl -s --max-time 30 "https://the-key-ibiza-backend.vercel.app/villas/availability/bulk" 2>/dev/null | head -c 100)
          if echo "$AVAIL" | grep -q '"availability"'; then
            echo "- ✅ Availability API" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Availability API broken**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}Calendario de disponibilidad no funciona\n"
          fi

          # 3. CONTENT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 3. Page Content" >> $GITHUB_STEP_SUMMARY

          for url in "https://thekey-ibiza.com|Home" "https://thekey-ibiza.com/villas|Villas" "https://thekey-ibiza.com/services|Services"; do
            URL=$(echo $url | cut -d'|' -f1)
            NAME=$(echo $url | cut -d'|' -f2)
            SIZE=$(curl -sL --max-time 10 "$URL" 2>/dev/null | wc -c | tr -d ' ')
            if [ "$SIZE" -gt 20000 ]; then
              echo "- ✅ $NAME (${SIZE} bytes)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **$NAME may be empty (${SIZE} bytes)**" >> $GITHUB_STEP_SUMMARY
              FAILURES="${FAILURES}${NAME} puede estar vacia (solo ${SIZE} bytes)\n"
            fi
          done

          JS_FILE=$(curl -sL --max-time 10 "https://thekey-ibiza.com" 2>/dev/null | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1)
          if [ -n "$JS_FILE" ]; then
            JS_TYPE=$(curl -sI --max-time 10 "https://thekey-ibiza.com/assets/$JS_FILE" 2>/dev/null | grep -i "content-type" | head -1)
            if echo "$JS_TYPE" | grep -qi "javascript"; then
              echo "- ✅ JS bundle OK" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **JS bundle broken**" >> $GITHUB_STEP_SUMMARY
              FAILURES="${FAILURES}JavaScript de la web no carga\n"
            fi
          fi

          CSS_FILE=$(curl -sL --max-time 10 "https://thekey-ibiza.com" 2>/dev/null | grep -oE 'index-[A-Za-z0-9_-]+\.css' | head -1)
          if [ -n "$CSS_FILE" ]; then
            CSS_TYPE=$(curl -sI --max-time 10 "https://thekey-ibiza.com/assets/$CSS_FILE" 2>/dev/null | grep -i "content-type" | head -1)
            if echo "$CSS_TYPE" | grep -qi "css"; then
              echo "- ✅ CSS bundle OK" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **CSS bundle broken**" >> $GITHUB_STEP_SUMMARY
              FAILURES="${FAILURES}Estilos de la web no cargan\n"
            fi
          fi

          # 4. SECURITY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 4. Security" >> $GITHUB_STEP_SUMMARY

          HEADERS=$(curl -sI --max-time 10 "https://thekey-ibiza.com" 2>/dev/null)
          for header in "strict-transport-security" "x-frame-options" "x-content-type-options" "content-security-policy"; do
            if echo "$HEADERS" | grep -qi "$header"; then
              echo "- ✅ $header" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **MISSING: $header**" >> $GITHUB_STEP_SUMMARY
              FAILURES="${FAILURES}Header de seguridad falta: ${header}\n"
            fi
          done

          EVIL=$(curl -sI --max-time 10 -H "Origin: https://evil.com" "https://the-key-ibiza-backend.vercel.app/" 2>/dev/null | grep -i "access-control-allow-origin" || true)
          if [ -z "$EVIL" ]; then
            echo "- ✅ CORS protected" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **CORS allows unknown origins**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}CORS permite origenes desconocidos\n"
          fi

          ADMIN_TEST=$(curl -s --max-time 10 "https://the-key-ibiza-backend.vercel.app/api/audit/stats" 2>/dev/null)
          if echo "$ADMIN_TEST" | grep -q "Authentication required"; then
            echo "- ✅ Admin endpoints protected" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Admin endpoints exposed**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}Endpoints admin accesibles sin auth\n"
          fi

          SSRF_TEST=$(curl -s --max-time 10 "https://the-key-ibiza-backend.vercel.app/image-proxy?url=http://localhost:5432" 2>/dev/null)
          if echo "$SSRF_TEST" | grep -q "Domain not allowed"; then
            echo "- ✅ SSRF protection" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **SSRF protection broken**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}Proteccion SSRF no funciona\n"
          fi

          EXPIRY=$(echo | openssl s_client -connect thekey-ibiza.com:443 -servername thekey-ibiza.com 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
          if [ -n "$EXPIRY" ]; then
            EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || echo 0)
            NOW_EPOCH=$(date +%s)
            if [ "$EXPIRY_EPOCH" -gt 0 ]; then
              DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
              if [ "$DAYS_LEFT" -lt 14 ]; then
                echo "- ⚠️ **SSL expires in $DAYS_LEFT days**" >> $GITHUB_STEP_SUMMARY
                FAILURES="${FAILURES}Certificado SSL expira en ${DAYS_LEFT} dias\n"
              else
                echo "- ✅ SSL valid ($DAYS_LEFT days)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          fi

          # 5. WISHLIST
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 5. Wishlist" >> $GITHUB_STEP_SUMMARY
          WL_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://thekey-ibiza.com/wishlist/test" 2>/dev/null)
          if [ "$WL_CODE" = "200" ]; then
            echo "- ✅ Wishlist pages load" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Wishlist broken ($WL_CODE)**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}Paginas de wishlist no cargan\n"
          fi

          # 6. MAPS
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 6. Maps" >> $GITHUB_STEP_SUMMARY
          MAP_TEST=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://a.tile.openstreetmap.org/10/512/384.png" 2>/dev/null)
          if [ "$MAP_TEST" = "200" ]; then
            echo "- ✅ Map tiles available" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Map tiles unavailable**" >> $GITHUB_STEP_SUMMARY
            FAILURES="${FAILURES}Mapas no funcionan\n"
          fi

          # SAVE RESULTS
          if [ -n "$FAILURES" ]; then
            echo "HAS_FAILURES=true" >> $GITHUB_OUTPUT
            printf "%b" "$FAILURES" > /tmp/failures.txt
          else
            echo "HAS_FAILURES=false" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send Telegram Alert on Failure
        if: steps.checks.outputs.HAS_FAILURES == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FAILURES=$(cat /tmp/failures.txt)
          MESSAGE=$(printf "🚨 ALERTA - The Key Ibiza\n\nProblemas detectados:\n\n%s\n🕐 %s" "$FAILURES" "$(date -u '+%Y-%m-%d %H:%M UTC')")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" > /dev/null

      - name: Send Daily OK at 8AM
        if: steps.checks.outputs.HAS_FAILURES == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOUR=$(date -u '+%H')
          if [ "$HOUR" = "08" ]; then
            MESSAGE=$(printf "✅ The Key Ibiza - Todo OK\n\nInforme diario: todos los sistemas funcionan correctamente.\n🕐 %s" "$(date -u '+%Y-%m-%d %H:%M UTC')")
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MESSAGE}" > /dev/null
          fi
